name: Release Android Library

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        type: string

jobs:
  build-and-release:
    name: Build AAR and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;26.1.10909125"

      - name: Install Rust toolchain (aarch64-linux-android)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: android-aarch64-release

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-lib/**/*.kts', 'android-lib/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Rust core (.so) for arm64-v8a
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
          RUSTFLAGS: "-C target-feature=+neon"
        run: |
          cd rust
          cargo ndk --target aarch64-linux-android build --release -p crabmagick-core
          mkdir -p ../android-lib/crabmagick-jni/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libcrabmagick.so \
             ../android-lib/crabmagick-jni/src/main/jniLibs/arm64-v8a/libcrabmagick.so

      - name: Run unit tests before releasing
        run: ./gradlew -p android-lib :crabmagick-jni:testReleaseUnitTest --no-daemon

      - name: Assemble release AAR
        run: ./gradlew -p android-lib :crabmagick-jni:assembleRelease --no-daemon

      - name: Rename AAR with version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp android-lib/crabmagick-jni/build/outputs/aar/crabmagick-jni-release.aar \
             crabmagick-${VERSION}.aar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: "CrabMagick v${{ steps.version.outputs.version }}"
          body: |
            ## CrabMagick Android Library v${{ steps.version.outputs.version }}

            Pure-Rust image processing library for Android — zero CMake, zero C++.

            ### Installation via JitPack

            **`settings.gradle`**
            ```groovy
            repositories {
                mavenCentral()
                maven { url 'https://jitpack.io' }
            }
            ```

            **`build.gradle`**
            ```groovy
            dependencies {
                implementation 'com.github.AhmadNaruto:crabmagic:${{ steps.version.outputs.version }}'
            }
            ```

            ### Or add the AAR directly
            Download `crabmagick-${{ steps.version.outputs.version }}.aar` below and add to your `libs/` folder.

            ### Supported Formats
            | Format | Decode | Encode |
            |--------|--------|--------|
            | JPEG XL | Yes | Yes |
            | JPEG | Yes | Yes |
            | PNG | Yes | Yes |
            | WebP | Yes | Yes |
            | TIFF | Yes | Yes |
            | BMP | Yes | - |
            | GIF | Yes | - |
          files: crabmagick-${{ steps.version.outputs.version }}.aar
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
